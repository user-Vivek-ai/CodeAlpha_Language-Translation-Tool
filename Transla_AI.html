
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Translator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#4285F4;--blue-dark:#3367D6;--blue-light:#E8F0FE;
  --green:#34A853;--red:#EA4335;--yellow:#FBBC05;
  --bg:#f8f9fa;--surface:#fff;--border:#dadce0;
  --text:#202124;--text-sec:#5f6368;--text-hint:#9aa0a6;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
  --shadow-md:0 4px 12px rgba(0,0,0,.12);
}
body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:64px;position:sticky;top:0;z-index:100;gap:14px}
.logo-icon{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#4285F4,#34A853 50%,#FBBC05 75%,#EA4335);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:20px;height:20px}
.logo-text{font-family:'Google Sans',sans-serif;font-size:22px;font-weight:500;color:var(--text)}
.logo-text b{color:var(--blue);font-weight:500}

/* MAIN */
main{max-width:920px;margin:28px auto;padding:0 16px}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}

/* INPUT SECTION */
.input-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 4px}
.detect-badge{display:inline-flex;align-items:center;gap:6px;font-family:'Google Sans',sans-serif;font-size:13px;font-weight:500;color:var(--blue)}
.detect-badge svg{width:14px;height:14px}
.found-chip{display:none;align-items:center;gap:5px;background:var(--blue-light);color:var(--blue-dark);border-radius:20px;padding:3px 11px;font-size:12px;font-weight:500}
.found-chip.show{display:inline-flex}
textarea{width:100%;border:none;outline:none;resize:none;min-height:170px;padding:10px 16px;font-family:'Google Sans',sans-serif;font-size:18px;line-height:1.65;color:var(--text);background:transparent;display:block}
textarea::placeholder{color:var(--text-hint)}
.input-bottom{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 10px}
.char-count{font-size:12px;color:var(--text-hint);padding:2px 6px}
.row-btns{display:flex;gap:4px}
.icon-btn{width:34px;height:34px;border-radius:50%;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-sec);transition:background .15s}
.icon-btn:hover{background:#f1f3f4}
.icon-btn svg{width:19px;height:19px}

/* DIVIDER */
.section-div{border-top:1px solid var(--border)}

/* TARGET LANG SECTION */
.target-section{padding:14px 16px 12px}
.section-label{font-size:11px;font-weight:500;color:var(--text-hint);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.pill{padding:6px 15px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-family:'Google Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-sec);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{background:var(--blue-light);border-color:#a8c7fa;color:var(--blue-dark)}
.pill.active{background:var(--blue-light);border-color:#a8c7fa;color:var(--blue-dark)}

/* SEARCH */
.search-wrap{position:relative;display:inline-block;width:100%;max-width:260px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-hint);pointer-events:none}
.lang-search{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--border);border-radius:20px;font-size:13px;outline:none;background:var(--bg);color:var(--text);font-family:'Roboto',sans-serif}
.lang-search:focus{border-color:var(--blue);background:var(--surface)}
.dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);max-height:200px;overflow-y:auto;z-index:300;box-shadow:var(--shadow-md)}
.dropdown.open{display:block}
.drop-item{padding:9px 14px;font-size:13px;cursor:pointer;color:var(--text)}
.drop-item:hover{background:var(--blue-light);color:var(--blue-dark)}
.drop-item.active{color:var(--blue);font-weight:500}

/* TRANSLATE BTN ROW */
.btn-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 12px;border-top:1px solid var(--border)}
.translate-btn{display:flex;align-items:center;gap:8px;padding:10px 28px;background:var(--blue);color:#fff;border:none;border-radius:24px;font-family:'Google Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s,box-shadow .15s;box-shadow:var(--shadow)}
.translate-btn:hover{background:var(--blue-dark);box-shadow:var(--shadow-md)}
.translate-btn:disabled{background:#bdc1c6;cursor:not-allowed;box-shadow:none}
.translate-btn svg{width:17px;height:17px}
.status{font-size:13px;color:var(--text-sec)}
.status.err{color:var(--red)}
.status.ok{color:var(--green)}
kbd{background:#f1f3f4;border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:11px}

/* OUTPUT SECTION */
.output-section{background:#f0f6ff;border-top:1px solid var(--border)}
.output-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 4px}
.output-lang{font-family:'Google Sans',sans-serif;font-size:13px;font-weight:500;color:var(--blue)}
.dots{display:none;align-items:center;gap:5px;padding:18px 16px}
.dots.show{display:flex}
.dots span{width:8px;height:8px;border-radius:50%;animation:bop 1.2s infinite}
.dots span:nth-child(1){background:var(--blue)}
.dots span:nth-child(2){background:var(--green);animation-delay:.2s}
.dots span:nth-child(3){background:var(--yellow);animation-delay:.4s}
.dots span:nth-child(4){background:var(--red);animation-delay:.6s}
@keyframes bop{0%,80%,100%{transform:scale(.55);opacity:.4}40%{transform:scale(1);opacity:1}}
.output-text{min-height:150px;padding:10px 16px 0;font-family:'Google Sans',sans-serif;font-size:18px;line-height:1.65;color:#1a5fb4;white-space:pre-wrap;word-break:break-word}
.output-hint{color:var(--text-hint)}
.output-btns{display:flex;gap:6px;padding:8px 12px 12px;justify-content:flex-end}
.out-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-sec);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.out-btn:hover{background:#e8f0fe;border-color:#a8c7fa;color:var(--blue-dark)}
.out-btn svg{width:16px;height:16px}

@media(max-width:580px){
  textarea,.output-text{font-size:16px}
  .pills{gap:5px}
  .pill{padding:5px 11px;font-size:12px}
  main{margin:12px auto}
}
</style>
</head>
<body>

<header>
  <div class="logo-icon">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 5h8M7 3v2M11 5c0 4-2 7-5 9M6 10c1 2 3 4 5 5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 19l4-9 4 9M14.5 14.5h3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <span class="logo-text">AI <b>Translate</b></span>
</header>

<main>
  <div class="card">

    <!-- INPUT -->
    <div class="input-top">
      <span class="detect-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Detect language
      </span>
      <span class="found-chip" id="foundChip">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
        <span id="foundName">English detected</span>
      </span>
    </div>

    <textarea id="inputText" placeholder="Enter text here…" maxlength="5000"></textarea>

    <div class="input-bottom">
      <span class="char-count"><span id="charCount">0</span> / 5000</span>
      <div class="row-btns">
        <button class="icon-btn" id="clearBtn" title="Clear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="section-div"></div>

    <!-- TARGET LANGUAGE PILLS -->
    <div class="target-section">
      <div class="section-label">Translate to</div>
      <div class="pills" id="pillsGrid"></div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="lang-search" id="langSearch" placeholder="Search all languages…" autocomplete="off">
        <div class="dropdown" id="dropdown"></div>
      </div>
    </div>

    <!-- TRANSLATE BUTTON -->
    <div class="btn-row">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="status" id="statusMsg"></span>
        <span style="font-size:12px;color:var(--text-hint)"><kbd>Ctrl</kbd>+<kbd>Enter</kbd></span>
      </div>
      <button class="translate-btn" id="translateBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 5h8M7 3v2M11 5c0 4-2 7-5 9M6 10c1 2 3 4 5 5"/>
          <path d="M12 19l4-9 4 9M14.5 14.5h3"/>
        </svg>
        Translate
      </button>
    </div>

    <!-- OUTPUT -->
    <div class="output-section">
      <div class="output-top">
        <span class="output-lang" id="outputLang"></span>
      </div>
      <div class="dots" id="dots"><span></span><span></span><span></span><span></span></div>
      <div class="output-text" id="outputText">
        <span class="output-hint">Translation will appear here</span>
      </div>
      <div class="output-btns">
        <button class="out-btn" id="copyBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>
    </div>

  </div>
</main>

<script>
// ─────────────────────────────────────────────
// LANGUAGE DATA
// ─────────────────────────────────────────────
const ALL_LANGS = [
  ["af","Afrikaans"],["sq","Albanian"],["am","Amharic"],["ar","Arabic"],
  ["hy","Armenian"],["az","Azerbaijani"],["eu","Basque"],["be","Belarusian"],
  ["bn","Bengali"],["bs","Bosnian"],["bg","Bulgarian"],["ca","Catalan"],
  ["zh","Chinese (Simplified)"],["zh-TW","Chinese (Traditional)"],
  ["hr","Croatian"],["cs","Czech"],["da","Danish"],["nl","Dutch"],
  ["en","English"],["eo","Esperanto"],["et","Estonian"],["fi","Finnish"],
  ["fr","French"],["gl","Galician"],["ka","Georgian"],["de","German"],
  ["el","Greek"],["gu","Gujarati"],["ht","Haitian Creole"],["ha","Hausa"],
  ["he","Hebrew"],["hi","Hindi"],["hu","Hungarian"],["is","Icelandic"],
  ["id","Indonesian"],["ga","Irish"],["it","Italian"],["ja","Japanese"],
  ["jv","Javanese"],["kn","Kannada"],["kk","Kazakh"],["km","Khmer"],
  ["ko","Korean"],["ky","Kyrgyz"],["lo","Lao"],["lv","Latvian"],
  ["lt","Lithuanian"],["mk","Macedonian"],["ms","Malay"],["ml","Malayalam"],
  ["mt","Maltese"],["mr","Marathi"],["mn","Mongolian"],["my","Myanmar"],
  ["ne","Nepali"],["no","Norwegian"],["or","Odia"],["ps","Pashto"],
  ["fa","Persian"],["pl","Polish"],["pt","Portuguese"],["pa","Punjabi"],
  ["ro","Romanian"],["ru","Russian"],["sr","Serbian"],["si","Sinhala"],
  ["sk","Slovak"],["sl","Slovenian"],["so","Somali"],["es","Spanish"],
  ["sw","Swahili"],["sv","Swedish"],["tl","Filipino"],["ta","Tamil"],
  ["tt","Tatar"],["te","Telugu"],["th","Thai"],["tr","Turkish"],
  ["uk","Ukrainian"],["ur","Urdu"],["uz","Uzbek"],["vi","Vietnamese"],
  ["cy","Welsh"],["xh","Xhosa"],["yi","Yiddish"],["yo","Yoruba"],["zu","Zulu"]
];

// Google Translate language codes (some differ from BCP-47)
const GT_CODE = {
  "zh":"zh-CN","zh-TW":"zh-TW","jv":"jw","he":"iw"
};

// BCP-47 locale for TTS
const TTS_LOCALE = {
  "af":"af-ZA","sq":"sq-AL","am":"am-ET","ar":"ar-SA","hy":"hy-AM",
  "az":"az-AZ","eu":"eu-ES","be":"be-BY","bn":"bn-BD","bs":"bs-BA",
  "bg":"bg-BG","ca":"ca-ES","zh":"zh-CN","zh-TW":"zh-TW","hr":"hr-HR",
  "cs":"cs-CZ","da":"da-DK","nl":"nl-NL","en":"en-US","eo":"eo",
  "et":"et-EE","fi":"fi-FI","fr":"fr-FR","gl":"gl-ES","ka":"ka-GE",
  "de":"de-DE","el":"el-GR","gu":"gu-IN","ht":"ht-HT","ha":"ha-NG",
  "he":"he-IL","hi":"hi-IN","hu":"hu-HU","is":"is-IS","id":"id-ID",
  "ga":"ga-IE","it":"it-IT","ja":"ja-JP","jv":"jv-ID","kn":"kn-IN",
  "kk":"kk-KZ","km":"km-KH","ko":"ko-KR","ky":"ky-KG","lo":"lo-LA",
  "lv":"lv-LV","lt":"lt-LT","mk":"mk-MK","ms":"ms-MY","ml":"ml-IN",
  "mt":"mt-MT","mr":"mr-IN","mn":"mn-MN","my":"my-MM","ne":"ne-NP",
  "no":"nb-NO","or":"or-IN","ps":"ps-AF","fa":"fa-IR","pl":"pl-PL",
  "pt":"pt-BR","pa":"pa-IN","ro":"ro-RO","ru":"ru-RU","sr":"sr-RS",
  "si":"si-LK","sk":"sk-SK","sl":"sl-SI","so":"so-SO","es":"es-ES",
  "sw":"sw-KE","sv":"sv-SE","tl":"fil-PH","ta":"ta-IN","tt":"tt-RU",
  "te":"te-IN","th":"th-TH","tr":"tr-TR","uk":"uk-UA","ur":"ur-PK",
  "uz":"uz-UZ","vi":"vi-VN","cy":"cy-GB","xh":"xh-ZA","yo":"yo-NG","zu":"zu-ZA"
};

const FEATURED = [
  ["hi","Hindi"],["te","Telugu"],["ta","Tamil"],["mr","Marathi"],
  ["bn","Bengali"],["ur","Urdu"],["pa","Punjabi"],["gu","Gujarati"],
  ["kn","Kannada"],["ml","Malayalam"],["fr","French"],["de","German"],
  ["es","Spanish"],["ja","Japanese"],["ko","Korean"],["ar","Arabic"],
  ["ru","Russian"],["zh","Chinese"],["pt","Portuguese"],["it","Italian"],
  ["tr","Turkish"],["vi","Vietnamese"],["th","Thai"],["nl","Dutch"],
  ["pl","Polish"],["sv","Swedish"],["id","Indonesian"],["en","English"]
];

let tgtCode = "hi";
let tgtName = "Hindi";
let srcDetectedCode = "en";

// ─────────────────────────────────────────────
// BUILD PILLS
// ─────────────────────────────────────────────
const pillsGrid = document.getElementById("pillsGrid");
function buildPill(code, name) {
  const b = document.createElement("button");
  b.className = "pill" + (code === tgtCode ? " active" : "");
  b.textContent = name;
  b.dataset.code = code;
  b.addEventListener("click", () => pickLang(code, name));
  return b;
}
FEATURED.forEach(([c,n]) => pillsGrid.appendChild(buildPill(c,n)));

function pickLang(code, name) {
  tgtCode = code; tgtName = name;
  document.querySelectorAll(".pill").forEach(p => p.classList.toggle("active", p.dataset.code === code));
  document.getElementById("langSearch").value = "";
  document.getElementById("dropdown").classList.remove("open");
}

// ─────────────────────────────────────────────
// SEARCH DROPDOWN
// ─────────────────────────────────────────────
const langSearch = document.getElementById("langSearch");
const dropdown = document.getElementById("dropdown");

langSearch.addEventListener("input", () => {
  const q = langSearch.value.trim().toLowerCase();
  if (!q) { dropdown.classList.remove("open"); return; }
  const hits = ALL_LANGS.filter(([c,n]) => n.toLowerCase().includes(q)).slice(0,20);
  if (!hits.length) { dropdown.classList.remove("open"); return; }
  dropdown.innerHTML = "";
  hits.forEach(([code,name]) => {
    const d = document.createElement("div");
    d.className = "drop-item" + (code === tgtCode ? " active" : "");
    d.textContent = name;
    d.addEventListener("click", () => {
      pickLang(code, name);
      langSearch.value = "";
      dropdown.classList.remove("open");
      if (!document.querySelector(`.pill[data-code="${code}"]`)) {
        pillsGrid.appendChild(buildPill(code, name));
        document.querySelectorAll(".pill").forEach(p => p.classList.toggle("active", p.dataset.code === code));
      }
    });
    dropdown.appendChild(d);
  });
  dropdown.classList.add("open");
});
document.addEventListener("click", e => {
  if (!langSearch.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove("open");
});

// ─────────────────────────────────────────────
// INPUT WIRING
// ─────────────────────────────────────────────
const inputEl = document.getElementById("inputText");
inputEl.addEventListener("input", () => {
  document.getElementById("charCount").textContent = inputEl.value.length;
  document.getElementById("foundChip").classList.remove("show");
});

document.getElementById("clearBtn").addEventListener("click", () => {
  inputEl.value = ""; inputEl.focus();
  document.getElementById("charCount").textContent = "0";
  document.getElementById("foundChip").classList.remove("show");
  document.getElementById("outputLang").textContent = "";
  document.getElementById("outputText").innerHTML = '<span class="output-hint">Translation will appear here</span>';
  setStatus("","");
});

// ─────────────────────────────────────────────
// COPY
// ─────────────────────────────────────────────
document.getElementById("copyBtn").addEventListener("click", () => {
  const el = document.getElementById("outputText");
  if (el.querySelector(".output-hint")) return;
  const txt = el.innerText.trim();
  if (!txt) return;
  navigator.clipboard.writeText(txt).then(() => setStatus("Copied!","ok"))
    .catch(() => { const t=document.createElement("textarea"); t.value=txt; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); setStatus("Copied!","ok"); });
});

// ─────────────────────────────────────────────
// TEXT-TO-SPEECH  (GT audio API + fallback Web Speech)
// ─────────────────────────────────────────────
function gtAudioUrl(text, lang) {
  const code = GT_CODE[lang] || lang;
  return `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${code}&client=gtx`;
}

async function speakWithGT(text, lang) {
  // Split into chunks ≤ 200 chars at word boundary
  const chunks = [];
  let remaining = text;
  while (remaining.length > 0) {
    if (remaining.length <= 200) { chunks.push(remaining); break; }
    let cut = remaining.lastIndexOf(" ", 200);
    if (cut < 1) cut = 200;
    chunks.push(remaining.slice(0, cut));
    remaining = remaining.slice(cut).trim();
  }

  for (const chunk of chunks) {
    await new Promise((resolve, reject) => {
      const audio = new Audio();
      audio.src = gtAudioUrl(chunk, lang);
      audio.crossOrigin = "anonymous";
      audio.onended = resolve;
      audio.onerror = reject;
      audio.play().catch(reject);
    });
  }
}

function speakWebSpeech(text, lang) {
  return new Promise((resolve, reject) => {
    const locale = TTS_LOCALE[lang] || lang;
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = locale;
    utt.rate = 0.88;
    utt.volume = 1;
    utt.onend = resolve;
    utt.onerror = reject;

    function go() {
      const voices = speechSynthesis.getVoices();
      const base = locale.split("-")[0];
      const v = voices.find(v => v.lang === locale) || voices.find(v => v.lang.startsWith(base+"-") || v.lang === base);
      if (v) utt.voice = v;
      speechSynthesis.cancel();
      speechSynthesis.speak(utt);
    }

    if (speechSynthesis.getVoices().length) go();
    else { speechSynthesis.onvoiceschanged = () => { speechSynthesis.onvoiceschanged = null; go(); }; }
  });
}

async function speak(text, lang) {
  if (!text || !text.trim()) return;
  try {
    await speakWithGT(text, lang);
  } catch {
    try { await speakWebSpeech(text, lang); }
    catch { /* silent */ }
  }
}

// ─────────────────────────────────────────────
// STATUS
// ─────────────────────────────────────────────
let stTimer;
function setStatus(msg, type) {
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.className = "status" + (type ? " "+type : "");
  clearTimeout(stTimer);
  if (type === "ok") stTimer = setTimeout(() => el.textContent = "", 2000);
}

// ─────────────────────────────────────────────
// TRANSLATE via Google Translate unofficial API (no key needed)
// ─────────────────────────────────────────────
async function translateText(text, targetLang) {
  const sl = "auto";
  const tl = GT_CODE[targetLang] || targetLang;
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&dt=ld&q=${encodeURIComponent(text)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("Translation request failed: " + res.status);
  const data = await res.json();

  // Parse translated text from response array
  let translated = "";
  if (data[0]) {
    for (const part of data[0]) {
      if (part && part[0]) translated += part[0];
    }
  }

  // Detected language
  let detectedLang = null;
  // data[2] is the detected source language code
  if (data[2]) detectedLang = data[2];

  return { translated, detectedLang };
}

// ─────────────────────────────────────────────
// LANGUAGE NAME FROM CODE
// ─────────────────────────────────────────────
function langNameFromCode(code) {
  if (!code) return null;
  // GT sometimes returns "zh-CN"
  const normalized = code === "zh-CN" ? "zh" : code === "iw" ? "he" : code === "jw" ? "jv" : code;
  const found = ALL_LANGS.find(([c]) => c === normalized);
  return found ? found[1] : null;
}

// ─────────────────────────────────────────────
// MAIN TRANSLATE HANDLER
// ─────────────────────────────────────────────
document.getElementById("translateBtn").addEventListener("click", doTranslate);
inputEl.addEventListener("keydown", e => { if ((e.ctrlKey||e.metaKey) && e.key==="Enter") doTranslate(); });

async function doTranslate() {
  const text = inputEl.value.trim();
  if (!text) { setStatus("Enter some text first.",""); return; }

  const btn = document.getElementById("translateBtn");
  btn.disabled = true;
  document.getElementById("dots").classList.add("show");
  document.getElementById("outputText").innerHTML = "";
  document.getElementById("outputLang").textContent = "";
  document.getElementById("foundChip").classList.remove("show");
  setStatus("Translating…","");

  try {
    const { translated, detectedLang } = await translateText(text, tgtCode);

    document.getElementById("dots").classList.remove("show");
    document.getElementById("outputText").textContent = translated;
    document.getElementById("outputLang").textContent = "→ " + tgtName;

    if (detectedLang) {
      const code = detectedLang === "zh-CN" ? "zh" : detectedLang === "iw" ? "he" : detectedLang === "jw" ? "jv" : detectedLang;
      srcDetectedCode = code;
      const name = langNameFromCode(detectedLang);
      if (name) {
        document.getElementById("foundName").textContent = name + " detected";
        document.getElementById("foundChip").classList.add("show");
      }
    }

    setStatus("","");
  } catch (err) {
    document.getElementById("dots").classList.remove("show");
    document.getElementById("outputText").innerHTML = '<span class="output-hint">Translation will appear here</span>';
    setStatus("Error: " + err.message, "err");
  } finally {
    btn.disabled = false;
  }
}

// Pre-load voices
if (window.speechSynthesis) speechSynthesis.getVoices();
</script>

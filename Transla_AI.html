<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transla.AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap');
        
        :root {
            --blue: #1a73e8;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Google Sans', system-ui, sans-serif;
            background: #f8f9fa;
            color: #202124;
        }
        
        .header {
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #dadce0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4285f4, #34a853);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 22px;
            font-weight: 400;
        }
        
        .main {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 16px;
            display: flex;
            gap: 16px;
        }
        
        .panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            min-height: 380px;
            overflow: hidden;
        }
        
        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid #dadce0;
            display: flex;
            align-items: center;
        }
        
        .lang-select {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 500;
            color: #202124;
            padding: 8px 12px;
            cursor: pointer;
        }
        
        textarea {
            flex: 1;
            padding: 20px 16px;
            font-size: 18px;
            line-height: 1.5;
            border: none;
            resize: none;
            font-family: inherit;
        }
        
        .input-footer {
            padding: 8px 16px;
            border-top: 1px solid #dadce0;
            display: flex;
            justify-content: flex-end;
            font-size: 13px;
            color: #5f6368;
        }
        
        .output-footer {
            padding: 12px 16px;
            border-top: 1px solid #dadce0;
            display: flex;
            gap: 16px;
        }
        
        .btn {
            background: none;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5f6368;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #f1f3f4;
        }
        
        .swap-container {
            display: flex;
            justify-content: center;
            padding: 8px 0;
        }
        
        .swap-btn {
            width: 50px;
            height: 50px;
            background: white;
            border: 1px solid #dadce0;
            border-radius: 50%;
            color: var(--blue);
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        
        .translate-btn {
            background: var(--blue);
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: #70757a;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main {
                flex-direction: column;
                padding: 12px;
            }
            .panel {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">T</div>
        <h1>Transla.AI</h1>
    </div>
    
    <div class="main">
        <!-- Source -->
        <div class="panel">
            <div class="panel-header">
                <select id="source-lang" class="lang-select"></select>
            </div>
            <textarea id="input-text" placeholder="Type or paste text"></textarea>
            <div class="input-footer">
                <span id="char-count">0 / 5000</span>
            </div>
        </div>

        <!-- Swap -->
        <div class="swap-container">
            <button id="swap-btn" class="swap-btn">⇄</button>
        </div>

        <!-- Target -->
        <div class="panel">
            <div class="panel-header">
                <select id="target-lang" class="lang-select"></select>
            </div>
            <textarea id="output-text" readonly placeholder="Translation"></textarea>
            <div class="output-footer">
                <button id="copy-btn" class="btn" title="Copy">📋</button>
            </div>
        </div>
    </div>
    
    <div style="text-align:center; margin: 10px 0;">
        <button id="translate-btn" class="translate-btn">Translate</button>
    </div>
    
    <div class="footer">
        Powered by MyMemory • Transla.AI
    </div>

    <script>
        const languages = [
            { code: "en", name: "English" },
            { code: "hi", name: "Hindi" },
            { code: "te", name: "Telugu" },
            { code: "ta", name: "Tamil" },
            { code: "fr", name: "French" },
            { code: "es", name: "Spanish" },
            { code: "de", name: "German" },
            { code: "ar", name: "Arabic" },
            { code: "zh-CN", name: "Chinese (Simplified)" },
            { code: "ja", name: "Japanese" },
            { code: "ko", name: "Korean" },
            { code: "pt", name: "Portuguese" },
            { code: "ru", name: "Russian" },
            { code: "it", name: "Italian" },
            { code: "tr", name: "Turkish" },
            { code: "nl", name: "Dutch" },
            { code: "pl", name: "Polish" },
            { code: "sv", name: "Swedish" },
            { code: "el", name: "Greek" },
            { code: "bn", name: "Bengali" },
            { code: "ur", name: "Urdu" },
            { code: "ms", name: "Malay" },
            { code: "id", name: "Indonesian" },
            { code: "vi", name: "Vietnamese" }
        ];

        let sourceLang = "en", targetLang = "hi";
        let debounceTimer;

        const sourceSelect = document.getElementById("source-lang");
        const targetSelect = document.getElementById("target-lang");
        const inputText = document.getElementById("input-text");
        const outputText = document.getElementById("output-text");
        const charCount = document.getElementById("char-count");
        const translateBtn = document.getElementById("translate-btn");
        const swapBtn = document.getElementById("swap-btn");
        const copyBtn = document.getElementById("copy-btn");

        function populateLanguages() {
            sourceSelect.innerHTML = targetSelect.innerHTML = "";
            languages.forEach(lang => {
                const o1 = new Option(lang.name, lang.code);
                if (lang.code === sourceLang) o1.selected = true;
                sourceSelect.add(o1);

                const o2 = new Option(lang.name, lang.code);
                if (lang.code === targetLang) o2.selected = true;
                targetSelect.add(o2);
            });
        }

        async function translateText() {
            const text = inputText.value.trim();
            if (!text) return;
            
            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`;
                const res = await fetch(url);
                const data = await res.json();
                outputText.value = data.responseData?.translatedText || "Translation failed";
            } catch (e) {
                outputText.value = "Translation failed. Please try again.";
            }
        }

        function init() {
            populateLanguages();

            sourceSelect.onchange = () => { sourceLang = sourceSelect.value; if(inputText.value) translateText(); };
            targetSelect.onchange = () => { targetLang = targetSelect.value; if(inputText.value) translateText(); };

            inputText.oninput = () => {
                charCount.textContent = `${inputText.value.length} / 5000`;
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(translateText, 800);
            };

            translateBtn.onclick = translateText;
            swapBtn.onclick = () => {
                [sourceLang, targetLang] = [targetLang, sourceLang];
                [inputText.value, outputText.value] = [outputText.value, inputText.value];
                populateLanguages();
                if (inputText.value) translateText();
            };
            copyBtn.onclick = () => {
                if (outputText.value) navigator.clipboard.writeText(outputText.value);
            };

            // Demo
            inputText.value = "What is your name";
            charCount.textContent = "17 / 5000";
            translateText();
        }

        window.onload = init;
    </script>
</body>
</html>
